services:
  cc-switch-web:
    volumes:
      # Copy this file to docker-compose.host.yml before editing.
      # This example is primarily for Linux hosts where $HOME points to the
      # account that owns the CLI config directories.
      - ${HOME}/.claude:/data/.claude
      - ${HOME}/.codex:/data/.codex
      - ${HOME}/.gemini:/data/.gemini
      - ${HOME}/.config/opencode:/data/.config/opencode
      - ${HOME}/.config/openclaw:/data/.config/openclaw
