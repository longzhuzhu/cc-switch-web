name: Web CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "release/**"
    paths:
      - ".github/workflows/web-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "src/**"
      - "backend/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.host.example.yml"
  pull_request:
    paths:
      - ".github/workflows/web-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "src/**"
      - "backend/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.host.example.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Project check
        run: pnpm check

      - name: Build Docker image
        if: runner.os == 'Linux'
        run: docker build -t cc-switch-web:test .

      - name: Run Docker container
        if: runner.os == 'Linux'
        env:
          CC_SWITCH_WEB_SMOKE_PORT: 8890
        run: docker run -d --name cc-switch-web-smoke -p ${CC_SWITCH_WEB_SMOKE_PORT}:${CC_SWITCH_WEB_SMOKE_PORT} cc-switch-web:test

      - name: Install curl
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl

      - name: Wait for health endpoint
        if: runner.os == 'Linux'
        env:
          CC_SWITCH_WEB_SMOKE_PORT: 8890
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:${CC_SWITCH_WEB_SMOKE_PORT}/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "health check timeout" >&2
          docker logs cc-switch-web-smoke || true
          exit 1

      - name: Print container logs on failure
        if: failure() && runner.os == 'Linux'
        run: docker logs cc-switch-web-smoke

      - name: Stop Docker container
        if: always() && runner.os == 'Linux'
        run: docker rm -f cc-switch-web-smoke
